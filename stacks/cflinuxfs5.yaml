name: cflinuxfs5
ubuntu_version: "24.04"
ubuntu_codename: noble
docker_image: cloudfoundry/cflinuxfs5

ruby_bootstrap:
  url: https://buildpacks.cloudfoundry.org/dependencies/ruby/ruby_3.3.6_linux_x64_cflinuxfs4_e4311262.tgz
  sha256: e4311262803d0e1a01c83001e3e98ad58700b5cc36eff12433f24312b11e3dc9
  install_dir: /opt/ruby

compilers:
  gfortran:
    version: 14
    bin: /usr/bin/x86_64-linux-gnu-gfortran-14
    lib_path: /usr/lib/gcc/x86_64-linux-gnu/14
    packages:
      - gfortran
      - libgfortran-14-dev
  gcc:
    version: 14
    packages:
      - gcc-14
      - g++-14
    ppa: ""
    tool_packages:
      - software-properties-common

apt_packages:
  php_build:
    - automake
    - firebird-dev
    - libaspell-dev
    - libc-client2007e-dev
    - libcurl4-openssl-dev
    - libdb5.3-dev
    - libedit-dev
    - libenchant-2-dev
    - libexpat1-dev
    - libgdbm-dev
    - libgeoip-dev
    - libgmp-dev
    - libgpgme11-dev
    - libjpeg-dev
    - libkrb5-dev
    - libldap2-dev
    - libmagickwand-dev
    - libmagickcore-dev
    - libmaxminddb-dev
    - libmcrypt-dev
    - libmemcached-dev
    - libonig-dev
    - libpng-dev
    - libpspell-dev
    - librecode-dev
    - libsasl2-dev
    - libsnmp-dev
    - libsqlite3-dev
    - libssh2-1-dev
    - libssl-dev
    - libtidy-dev
    - libtool
    - libwebp-dev
    - libxml2-dev
    - libzip-dev
    # libzookeeper-mt-dev omitted — not available on Ubuntu 24.04
    - snmp-mibs-downloader
    - sqlite3
    - unixodbc-dev
  r_build:
    - gfortran
    - libbz2-dev
    - liblzma-dev
    - libpcre2-dev
    - libcurl4-openssl-dev
    - libsodium-dev
    - libharfbuzz-dev
    - libfribidi-dev
    - default-jre
    - libgfortran-14-dev
    - libfreetype6-dev
    - libpng-dev
    - libtiff-dev
    - libjpeg-dev
    - libwebp-dev
  ruby_build:
    - libffi-dev
  python_build:
    - libdb5.3-dev
    - libgdbm-dev
    - tk8.6-dev
  node_build: []
  httpd_build:
    - libldap2-dev
    - libjansson-dev
    # libcjose-dev omitted — needs verification on Ubuntu 24.04
    - libhiredis-dev
  libgdiplus_build:
    - automake
    - libtool
    - libglib2.0-dev
    - libcairo2-dev
  libunwind_build:
    - autoconf
    - automake
    - libtool
  hwc_build:
    - mingw-w64
  pip_build:
    - python3
    - python3-pip
  python_deb_extras:
    - libxss1

php_symlinks:
  - src: /usr/include/x86_64-linux-gnu/curl
    dst: /usr/local/include/curl
  - src: /usr/include/x86_64-linux-gnu/gmp.h
    dst: /usr/include/gmp.h
  - src: /usr/lib/x86_64-linux-gnu/libldap.so
    dst: /usr/lib/libldap.so
  # libldap_r removed — dropped in OpenLDAP 2.6 (Ubuntu 24.04)

jruby:
  jdk_url: https://java-buildpack.cloudfoundry.org/openjdk-jdk/jammy/x86_64/bellsoft-jdk8u452%2B11-linux-amd64.tar.gz
  jdk_sha256: d87d70d286150e662f12650ed22d91f1663c267b27ab3b0775eed1416ef3bd12
  jdk_install_dir: /opt/java

go:
  bootstrap_url: https://go.dev/dl/go1.24.2.linux-amd64.tar.gz
  bootstrap_sha256: 68097bd680839cbc9d464a0edce4f7c333975e27a90246890e9f1078c7e702ad

python:
  tcl_version: "8.6"
  use_force_yes: false

httpd_sub_deps:
  apr:
    version: "1.7.4"
    url: https://archive.apache.org/dist/apr/apr-1.7.4.tar.gz
    sha256: a4137dd82a185076fa50ba54232d920a17c6469c30b0876569e1c2a05ff311d9
  apr_iconv:
    version: "1.2.2"
    url: https://archive.apache.org/dist/apr/apr-iconv-1.2.2.tar.gz
    sha256: ce94c7722ede927ce1e5a368675ace17d96d60ff9b8918df216ee5c1298c6a5e
  apr_util:
    version: "1.6.3"
    url: https://archive.apache.org/dist/apr/apr-util-1.6.3.tar.gz
    sha256: 2b74d8932703826862ca305b094eef2983c27b39d5c9414442e9976a9acf1983
  mod_auth_openidc:
    version: "2.3.8"
    url: https://github.com/OpenIDC/mod_auth_openidc/releases/download/v2.3.8/mod_auth_openidc-2.3.8.tar.gz
    sha256: 0f078444fed34085bc83e27eb3439556718f50dcea275307ffb66d498bdabb8f
