name: cflinuxfs5
ubuntu_version: "24.04"
ubuntu_codename: noble
docker_image: cloudfoundry/cflinuxfs5

ruby_bootstrap:
  url: https://buildpacks.cloudfoundry.org/dependencies/ruby/ruby_3.3.6_linux_x64_cflinuxfs5_XXXX.tgz
  sha256: XXXX
  install_dir: /opt/ruby

compilers:
  gfortran:
    version: 14
    bin: /usr/bin/x86_64-linux-gnu-gfortran-14
    lib_path: /usr/lib/gcc/x86_64-linux-gnu/14
    packages:
      - gfortran
      - libgfortran-14-dev
  gcc:
    version: 14
    packages:
      - gcc-14
      - g++-14
    ppa: ""

apt_packages:
  php_build:
    - automake
    - firebird-dev
    - libaspell-dev
    - libc-client2007e-dev
    - libcurl4-openssl-dev
    - libdb5.3-dev
    - libedit-dev
    - libenchant-2-dev
    - libexpat1-dev
    - libgdbm-dev
    - libgeoip-dev
    - libgmp-dev
    - libgpgme11-dev
    - libjpeg-dev
    - libkrb5-dev
    - libldap2-dev
    - libmagickwand-dev
    - libmagickcore-dev
    - libmaxminddb-dev
    - libmcrypt-dev
    - libmemcached-dev
    - libonig-dev
    - libpng-dev
    - libpspell-dev
    - librecode-dev
    - libsasl2-dev
    - libsnmp-dev
    - libsqlite3-dev
    - libssh2-1-dev
    - libssl-dev
    - libtidy-dev
    - libtool
    - libwebp-dev
    - libxml2-dev
    - libzip-dev
    # libzookeeper-mt-dev omitted — not available on Ubuntu 24.04
    - snmp-mibs-downloader
    - sqlite3
    - unixodbc-dev
  r_build:
    - gfortran
    - libbz2-dev
    - liblzma-dev
    - libpcre2-dev
    - libcurl4-openssl-dev
    - libsodium-dev
    - libharfbuzz-dev
    - libfribidi-dev
    - default-jre
    - libgfortran-14-dev
    - libfreetype6-dev
    - libpng-dev
    - libtiff-dev
    - libjpeg-dev
    - libwebp-dev
  ruby_build:
    - libffi-dev
  python_build:
    - libdb5.3-dev
    - libgdbm-dev
    - tk8.6-dev
  node_build: []
  httpd_build:
    - libldap2-dev
    - libjansson-dev
    # libcjose-dev omitted — needs verification on Ubuntu 24.04
    - libhiredis-dev
  libgdiplus_build:
    - automake
    - libtool
    - libglib2.0-dev
    - libcairo2-dev

php_symlinks:
  - src: /usr/include/x86_64-linux-gnu/curl
    dst: /usr/local/include/curl
  - src: /usr/include/x86_64-linux-gnu/gmp.h
    dst: /usr/include/gmp.h
  - src: /usr/lib/x86_64-linux-gnu/libldap.so
    dst: /usr/lib/libldap.so
  # libldap_r removed — dropped in OpenLDAP 2.6 (Ubuntu 24.04)

jruby:
  jdk_url: https://java-buildpack.cloudfoundry.org/openjdk-jdk/noble/x86_64/openjdk-jdk-1.8.0_XXX-noble.tar.gz
  jdk_sha256: XXXX
  jdk_install_dir: /opt/java

python:
  tcl_version: "8.6"
  use_force_yes: false
